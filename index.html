function makeMath(level, force) {
  const d = clamp(level, 1, 20);
  const type = force || rint(1, 7);
  let q, a;
  if (type === 1) { const x=rint(d*2,d*9+15), y=rint(d,d*7+8); q=`${x} + ${y} = ?`; a=x+y; }
  else if (type === 2) { const x=rint(d*3,d*9+25), y=rint(1,x); q=`${x} − ${y} = ?`; a=x-y; }
  else if (type === 3) { const x=rint(2,Math.min(d+3,12)), y=rint(2,Math.min(d+2,12)); q=`${x} × ${y} = ?`; a=x*y; }
  else if (type === 4) { const y=rint(2,Math.min(d+2,12)), b=rint(2,Math.min(d+3,12)); q=`${y*b} ÷ ${y} = ?`; a=b; }
  else if (type === 5) { const each=rint(2,Math.min(d+2,9)), g=rint(2,Math.min(d+1,8)); q=`Each basket holds ${each} apples. How many in ${g} baskets?`; a=each*g; }
  else if (type === 6) { const x=rint(d,d*9+20), y=rint(d,d*9+20); const big=Math.max(x,y);
    const opts=[...new Set([String(x),String(y),String(Math.min(x,y)+1),String(big+2)])].slice(0,4);
    return { kind:"Math", subtype:6, prompt:`Which is greater: ${x} or ${y}?`, options: shuffle(opts), answer:String(big) }; }
  else { const denom=pick([2,3,4,5]); const whole=denom*rint(2,Math.min(d+2,9)); q=`What is 1/${denom} of ${whole}?`; a=whole/denom; }
  const opts=new Set([a]); while(opts.size<4){ const c=a+rint(-8,8); if(c!==a&&c>=0)opts.add(c); }
  return { kind:"Math", subtype:type, prompt:q, options: shuffle([...opts]).map(String), answer:String(a) };
}
function makeReading() { const [prompt,options,answer]=pick(READING); return { kind:"Reading", subtype:"vocab", prompt, options: shuffle(options), answer }; }
function makePassage() { const p=pick(PASSAGES); return { kind:"Reading", subtype:"passage", passage:p.text, prompt:p.q, options: shuffle(p.options), answer:p.answer }; }
function makeElement() { const [name,sym]=pick(ELEMENTS); const wrong=shuffle(ELEMENTS.filter(e=>e[1]!==sym)).slice(0,3).map(e=>e[1]); return { kind:"Element", subtype:"symbol", prompt:`BONUS! Chemical symbol for ${name}?`, options: shuffle([sym,...wrong]), answer: sym }; }
function buildQuestion(level, idx, weak) {
  if (idx === 4) return makeElement();
  if (idx % 2 === 0) return makeMath(level, weak.mathForce);
  const passChance = weak.readingPassageWeak ? 55 : 35;
  return rint(1,100) <= passChance ? makePassage() : makeReading();
}
function battleQuestion(level) { return rint(0,1) ? makeMath(level) : makeReading(); }

function QuestMap({ trail, level }) {
  return (
    <div style={{ background:"#1d1a15", borderRadius:10, padding:"12px 10px", margin:"8px 0 4px" }}>
      <div style={{ ...S.stat, marginBottom:8 }}>Your journey · Level {level} of 20</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, alignItems:"center" }}>
        {Array.from({ length:20 }).map((_,i)=>{
          const n=i+1, done=n<level, here=n===level, seg=trail[i];
          return (
            <div key={n} style={{ display:"flex", alignItems:"center", gap:4 }}>
              <div title={seg?seg.dest:""} style={{ width:here?22:16, height:here?22:16, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", background: here?"#c9a227": done?"#5b8c6a":"#3a342b", color: here?"#1c1a17":"#15130f", fontSize:10, fontWeight:700, border: here?"2px solid #f3ead6":"none" }}>{here?"★":done?"✓":n}</div>
              {n<20 && <span style={{ color:"#473f33", fontSize:11 }}>{seg ? (seg.dir==="L"?"◄":seg.dir==="R"?"►":"·") : "·"}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const [stats,setStats]=useState({Math:{seen:0,right:0},ReadingVocab:{seen:0,right:0},ReadingPassage:{seen:0,right:0},Element:{seen:0,right:0},bestStreak:0,monstersBeaten:0,mathTypes:{}});

  const [question,setQuestion]=useState(null);
  const [picked,setPicked]=useState(null);
  const [forkOpts,setForkOpts]=useState(null);

  const [monster,setMonster]=useState(null);
  const [mhp,setMhp]=useState(0);
  const [logLines,setLogLines]=useState([]);
  const [mode,setMode]=useState(null);
  const [battleQ,setBattleQ]=useState(null);
  const [battlePicked,setBattlePicked]=useState(null);

  function unlockedColorIds(profile){
    const base=["gold","emerald","sapphire","crimson"];
    COLORS.forEach(c=>{ if(c.unlockPts && profile.bestPoints>=c.unlockPts) base.push(c.id); });
    return base;
  }

  function weakProfile(){
    let mathForce=null, worst=0;
    for(const [t,v] of Object.entries(stats.mathTypes)){
      if(v.seen>=2){ const rate=v.wrong/v.seen; if(rate>worst&&rate>=0.5){ worst=rate; mathForce=Number(t); } }
    }
    const pv=stats.ReadingPassage;
    const readingPassageWeak = pv.seen>=2 && (pv.right/pv.seen)<0.6;
    return { mathForce: mathForce && rint(1,100)<=40 ? mathForce : null, readingPassageWeak };
  }

  useEffect(()=>{ if(screen==="play" && !question) setQuestion(buildQuestion(level,qIdx,weakProfile())); },[screen,level,qIdx]);

  // persist mid-run snapshot whenever key state changes during a run
  useEffect(()=>{
    if(["play","fork","levelup","battle"].includes(screen)){
      const snap={ name, clsId:cls.id, colorId:color.id, level, qIdx, points, hp, powerUps, shield, special, trail, stats };
      const next={...save, inProgress:snap, lastName:name};
      setSave(next); writeSave(next);
    }
  },[level,qIdx,points,hp,screen]);

  function commitLifetime(finalPoints, finalLevel){
    const lt={...save.lifetime};
    ["Math","ReadingVocab","ReadingPassage","Element"].forEach(k=>{
      lt[k]={ seen:lt[k].seen+stats[k].seen, right:lt[k].right+stats[k].right };
    });
    lt.bestStreak=Math.max(lt.bestStreak,stats.bestStreak);
    lt.monstersBeaten=lt.monstersBeaten+stats.monstersBeaten;
    const bestPoints=Math.max(save.bestPoints, finalPoints);
    const next={ ...save, lifetime:lt, bestPoints, bestLevel:Math.max(save.bestLevel,finalLevel), unlockedColors:unlockedColorIds({...save,bestPoints}), inProgress:null, lastName:name };
    setSave(next); writeSave(next);
  }

  function statKey(qn){ if(qn.kind==="Math")return "Math"; if(qn.kind==="Element")return "Element"; return qn.subtype==="passage"?"ReadingPassage":"ReadingVocab"; }
  function recordAnswer(qn,correct){
    setStats(prev=>{
      const k=statKey(qn);
      const next={...prev,[k]:{seen:prev[k].seen+1,right:prev[k].right+(correct?1:0)}};
      if(qn.kind==="Math"&&qn.subtype){ const mt={...prev.mathTypes}; const cur=mt[qn.subtype]||{seen:0,wrong:0}; mt[qn.subtype]={seen:cur.seen+1,wrong:cur.wrong+(correct?0:1)}; next.mathTypes=mt; }
      return next;
    });
  }

  function goCustomize(){ setName(n=>n.trim()||"Hero"); setScreen("customize"); }
  function freshRun(){
    setLevel(1); setQIdx(0); setPoints(0); setStreak(0); setHp(100); setPowerUps(0); setShield(0); setSpecial(0); setTrail([]);
    setStats({Math:{seen:0,right:0},ReadingVocab:{seen:0,right:0},ReadingPassage:{seen:0,right:0},Element:{seen:0,right:0},bestStreak:0,monstersBeaten:0,mathTypes:{}});
    setQuestion(null); setScreen("play");
  }
  function resumeRun(){
    const s=save.inProgress; if(!s) return;
    setName(s.name); setCls(CLASSES.find(c=>c.id===s.clsId)||CLASSES[0]); setColor(COLORS.find(c=>c.id===s.colorId)||COLORS[0]);
    setLevel(s.level); setQIdx(s.qIdx); setPoints(s.points); setHp(s.hp); setPowerUps(s.powerUps); setShield(s.shield); setSpecial(s.special);
    setTrail(s.trail||[]); setStats(s.stats); setStreak(0); setQuestion(null); setScreen("play");
  }
  function eraseSave(){ const fresh=blankProfile(); fresh.lastName=name; setSave(fresh); writeSave(fresh); }

  function answer(opt){
    if(picked) return; setPicked(opt);
    const correct=opt===question.answer; recordAnswer(question,correct);
    const base=question.kind==="Element"?50:question.subtype==="passage"?30:20;
    if(correct){ const ns=streak+1; setStreak(ns); setStats(p=>({...p,bestStreak:Math.max(p.bestStreak,ns)})); setPoints(p=>p+base+(streak>=2?10:0)); if(ns%4===0) setSpecial(s=>s+1); }
    else setStreak(0);
  }
  function next(){
    setPicked(null); setQuestion(null);
    if(qIdx<4){ setQIdx(i=>i+1); return; }
    setForkOpts(shuffle(DESTINATIONS).slice(0,2)); setScreen("fork");
  }
  function choosePath(dest,dir){
    setTrail(t=>{ const n=[...t]; n[level-1]={dir,dest:dest.name}; return n; });
    if(level===20){ startBattle(dest,true); return; }
    if(rint(1,100)<=55) startBattle(dest,false); else advanceLevel();
  }
  function advanceLevel(){ if(level>=20){ winRun(); return; } setQIdx(0); setQuestion(null); setLevel(l=>l+1); setScreen("levelup"); }

  function startBattle(dest,forceBoss){
    let m; if(forceBoss||level===20){ m=MONSTERS[19]; } else { m=rint(1,100)<=40?pick(MONSTERS.slice(0,19)):MONSTERS[clamp(level-1,0,18)]; }
    setMonster(m); setMhp(m.hp); setLogLines([`${m.boss?"⚠ BOSS! ":""}A ${m.name} appears in ${dest.name}!`]);
    setMode(null); setBattleQ(null); setBattlePicked(null); setScreen("battle");
  }
  function chooseAction(m){ setMode(m); setBattleQ(battleQuestion(level)); setBattlePicked(null); }
  function answerBattle(opt){
    if(battlePicked) return; setBattlePicked(opt);
    const correct=opt===battleQ.answer; recordAnswer(battleQ,correct);
    const lines=[];
    if(mode==="attack"||mode==="special"){
      if(correct){
        let dmg=cls.dmg+rint(0,6);
        if(mode==="special"){
          if(cls.id==="knight"){ dmg*=3; lines.push("⚔ MIGHTY BLOW — triple damage!"); }
          else if(cls.id==="mage"){ dmg+=8; lines.push("🔥 FIREBALL — extra burn!"); }
          else if(cls.id==="ranger"){ dmg*=2; lines.push("🏹 DOUBLE SHOT — two arrows!"); }
          else { setShield(s=>s+1); lines.push("🛡 BULWARK — damage + a shield!"); }
          setSpecial(s=>s-1);
        } else if(powerUps>0){ dmg*=2; setPowerUps(p=>p-1); lines.push("⚡ Power-up — double damage!"); }
        const nm=Math.max(0,mhp-dmg); setMhp(nm); lines.push(`You hit ${monster.name} for ${dmg}!`);
        if(nm<=0){ const pts=monster.boss?100:30; lines.push(`${monster.name} defeated! +${pts} pts.`); setPoints(p=>p+pts); setStats(s=>({...s,monstersBeaten:s.monstersBeaten+1})); }
      } else { lines.push("Miss — wrong answer!"); monsterTurn(lines); }
    } else if(mode==="heal"){ if(correct){ const h=rint(15,25); setHp(v=>Math.min(100,v+h)); lines.push(`You recover ${h} HP!`); } else lines.push("Healing fizzles — wrong answer."); monsterTurn(lines); }
    else if(mode==="charge"){ if(correct){ setPowerUps(p=>p+1); lines.push("Power-up charged!"); } else lines.push("The spell sputters — wrong answer."); monsterTurn(lines); }
    setLogLines(l=>[...lines,...l].slice(0,6));
  }
  function monsterTurn(lines){ let dmg=rint(6,8+level); if(monster.boss)dmg+=6; if(shield>0){ dmg=Math.floor(dmg/2); setShield(s=>s-1); lines.push("Shield softens the blow!"); } const nh=Math.max(0,hp-dmg); setHp(nh); lines.push(`${monster.name} hits you for ${dmg}.`); if(nh<=0) lines.push("You have fallen..."); }
  function afterBattle(){ setMode(null); setBattleQ(null); setBattlePicked(null); if(hp<=0){ loseRun(); return; } if(mhp<=0){ if(level>=20){ winRun(); } else advanceLevel(); } }
  function buyShield(){ if(points>=40){ setPoints(p=>p-40); setShield(s=>s+1); setLogLines(l=>["You buy a shield (+1).",...l].slice(0,6)); } }
  function buyPower(){ if(points>=60){ setPoints(p=>p-60); setPowerUps(p=>p+1); setLogLines(l=>["You buy a power-up (+1).",...l].slice(0,6)); } }

  function winRun(){ commitLifetime(points,20); setScreen("win"); }
  function loseRun(){ commitLifetime(points,level); setScreen("over"); }

  const heroArt=cls.art.join("\n");
  const unlocked=save.unlockedColors||["gold","emerald","sapphire","crimson"];

  function StatBar({label,o}){ const pct=o.seen?Math.round(o.right/o.seen*100):0; return (
    <div style={{margin:"8px 0"}}>
      <div style={{...S.row,marginBottom:4}}><span style={{fontSize:14}}>{label}</span><span style={S.stat}>{o.right}/{o.seen} · {pct}%</span></div>
      <div style={S.bar}><div style={S.fill(pct, pct>=70?"#5b8c6a":pct>=40?"#c9a227":"#a6564a")} /></div>
    </div>); }

  // ── START ──
  if(screen==="start"){
    const ip=save.inProgress;
    return <div style={S.shell}><div style={S.card}>
      <span style={S.badge}>Quest Academy · v4</span>
      <h1 style={S.hat}>Learn. Customize. Battle. Adventure.</h1>
      <p style={{color:"#c4b8a4",lineHeight:1.6,marginTop:0}}>Answer math &amp; reading questions to power up your hero, follow your quest map, battle 20 monsters and a final boss, and unlock new colors. Your progress saves automatically on this computer.</p>
      <div style={S.art(COLORS[0].hex)}>{CLASSES[0].art.join("\n")}</div>
      {ip && <button style={S.cta("#5b8c6a")} onClick={resumeRun}>▶ Resume — {ip.name}, Level {ip.level}</button>}
      <label style={{...S.stat,display:"block",margin:"14px 0 6px"}}>Name your hero</label>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="Type a name…" maxLength={14}
        style={{width:"100%",padding:"14px 16px",borderRadius:12,fontSize:17,background:"#2f2a22",border:"1px solid #473f33",color:"#e8e0d2",fontFamily:"inherit"}}
        onKeyDown={e=>e.key==="Enter"&&goCustomize()} />
      <button style={S.cta()} onClick={goCustomize}>{ip?"Start a new quest →":"Build your hero →"}</button>
      {(save.bestPoints>0) && <button style={S.ghost} onClick={()=>setScreen("stats")}>📊 View lifetime stats</button>}
    </div></div>;
  }

  // ── CUSTOMIZE ──
  if(screen==="customize"){
    return <div style={S.shell}><div style={S.card}>
      <span style={S.badge}>Build your hero</span>
      <h1 style={S.hat}>Choose a class</h1>
      <div style={S.art(color.hex)}>{heroArt}</div>
      <div style={S.grid}>
        {CLASSES.map(c=>(
          <button key={c.id} onClick={()=>setCls(c)} style={{...S.choice,margin:0,borderColor:cls.id===c.id?color.hex:"#473f33",borderWidth:cls.id===c.id?2:1}}>
            <div style={{fontWeight:700}}>{c.name}</div><div style={S.stat}>{c.blurb}</div>
            <div style={{...S.stat,color:"#c9a227",marginTop:4}}>★ {c.ability}</div>
          </button>
        ))}
      </div>
      <h2 style={{...S.hat,fontSize:20,marginTop:20}}>Pick a color</h2>
      <p style={S.stat}>Locked colors unlock as your best score grows. Best so far: {save.bestPoints} pts.</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {COLORS.map(c=>{ const locked=!unlocked.includes(c.id);
          return <div key={c.id} style={S.swatch(c.hex, color.id===c.id, locked)} onClick={()=>!locked&&setColor(c)}>{locked?`★${c.unlockPts}`:""}</div>; })}
      </div>
      <button style={S.cta(color.hex)} onClick={freshRun}>Begin the quest →</button>
      <button style={S.ghost} onClick={()=>setScreen("start")}>← Back</button>
    </div></div>;
  }

  // ── LEVEL-UP ──
  if(screen==="levelup"){
    const newTitle=titleFor(level)!==titleFor(level-1);
    return <div style={S.shell}><div style={S.card}>
      <span style={S.badge}>Onward!</span>
      <h1 style={S.hat}>Level {level}</h1>
      <div style={{...S.art(color.hex),fontSize:22}}>{heroArt}</div>
      {newTitle && <p style={{textAlign:"center",color:"#c9a227",fontWeight:700}}>New rank: {name} the {titleFor(level)}!</p>}
      <QuestMap trail={trail} level={level} />
      <div style={{...S.row,marginTop:6}}><span style={S.stat}>★ {points} · ❤ {hp}</span><span style={S.stat}>⚡{powerUps} · 🛡{shield} · ✦{special}</span></div>
      <button style={S.cta()} onClick={()=>{ setQuestion(null); setScreen("play"); }}>Continue →</button>
      <button style={S.ghost} onClick={()=>setScreen("stats")}>📊 View my stats</button>
    </div></div>;
  }

  // ── STATS ──
  if(screen==="stats"){
    const inRun=["Math","ReadingVocab","ReadingPassage","Element"].some(k=>stats[k].seen>0);
    const src=inRun?stats:save.lifetime;
    const tot=["Math","ReadingVocab","ReadingPassage","Element"].reduce((a,k)=>({seen:a.seen+src[k].seen,right:a.right+src[k].right}),{seen:0,right:0});
    const overall=tot.seen?Math.round(tot.right/tot.seen*100):0;
    return <div style={S.shell}><div style={S.card}>
      <span style={S.badge}>{inRun?"This run":"Lifetime report"}</span>
      <h1 style={S.hat}>{name||"Hero"}'s progress</h1>
      <div style={{...S.row,marginBottom:10}}><span style={S.stat}>Overall accuracy</span><span style={{fontSize:22,fontWeight:700,color:"#c9a227"}}>{overall}%</span></div>
      <StatBar label="Math" o={src.Math} />
      <StatBar label="Reading — vocabulary & grammar" o={src.ReadingVocab} />
      <StatBar label="Reading — comprehension" o={src.ReadingPassage} />
      <StatBar label="Periodic table (bonus)" o={src.Element} />
      <div style={{...S.row,marginTop:14,paddingTop:12,borderTop:"1px solid #3a342b"}}>
        <span style={S.stat}>🔥 Best streak: {src.bestStreak}</span><span style={S.stat}>⚔ Monsters beaten: {src.monstersBeaten}</span>
      </div>
      {!inRun && <div style={{...S.row,marginTop:8}}><span style={S.stat}>🏆 Best score: {save.bestPoints}</span><span style={S.stat}>📈 Furthest: Level {save.bestLevel}</span></div>}
      <button style={S.cta()} onClick={()=>setScreen(inRun?(monster&&mhp<=0?"levelup":"play"):"start")}>← Back</button>
    </div></div>;
  }

  // ── FORK ──
  if(screen==="fork" && forkOpts){
    const [L,R]=forkOpts;
    return <div style={S.shell}><div style={S.card}>
      <span style={S.badge}>Level {level} cleared</span>
      <h1 style={S.hat}>A fork in the road</h1>
      <QuestMap trail={trail} level={level} />
      <p style={{color:"#c4b8a4",lineHeight:1.6}}>{name} the {titleFor(level)} reaches a split. Monsters may lurk on either path.</p>
      <button style={S.choice} onClick={()=>choosePath(L,"L")}><div style={{fontWeight:700}}>◄ LEFT — {L.name}</div><div style={S.stat}>{L.blurb}</div></button>
      <button style={S.choice} onClick={()=>choosePath(R,"R")}><div style={{fontWeight:700}}>RIGHT — {R.name} ►</div><div style={S.stat}>{R.blurb}</div></button>
      <div style={{...S.row,marginTop:8}}><span style={S.stat}>★ {points} · ❤{hp}</span><span style={S.stat}>⚡{powerUps} · 🛡{shield} · ✦{special}</span></div>
    </div></div>;
  }

  // ── BATTLE ──
  if(screen==="battle" && monster){
    const finished=mhp<=0||hp<=0;
    return <div style={S.shell}><div style={S.card}>
      <span style={{...S.badge, color:monster.boss?"#a62a4a":"#c9a227", borderColor:monster.boss?"#a62a4a":"#5c4f2e"}}>{monster.boss?"⚠ BOSS BATTLE":`Battle · Level ${level}`}</span>
      <div style={S.row}>
        <div><div style={{fontWeight:700,fontSize:18}}>{monster.name}</div>
          <div style={{...S.bar,width:180,marginTop:6}}><div style={S.fill(mhp/monster.hp*100,monster.color)} /></div>
          <div style={S.stat}>{mhp} / {monster.hp} HP</div></div>
        <div style={S.art(monster.color)}>{monster.art}</div>
      </div>
      <div style={{...S.row,marginTop:14,paddingTop:14,borderTop:"1px solid #3a342b"}}>
        <div style={S.art(color.hex)}>{heroArt}</div>
        <div style={{flex:1}}><div style={{fontWeight:700}}>{name}</div>
          <div style={{...S.bar,marginTop:6}}><div style={S.fill(hp,"#a6564a")} /></div>
          <div style={S.stat}>❤{hp} · ⚡{powerUps} · 🛡{shield} · ✦{special} · ★{points}</div></div>
      </div>
      <div style={{background:"#1d1a15",borderRadius:10,padding:"10px 12px",margin:"14px 0",minHeight:64}}>
        {logLines.map((l,i)=>(<div key={i} style={{...S.stat,color:i===0?"#e8e0d2":"#8a7f6c",margin:"2px 0"}}>{l}</div>))}
      </div>
      {!battleQ && !finished && (<>
        <button style={S.cta("#a6564a")} onClick={()=>chooseAction("attack")}>⚔ Attack {powerUps>0?"(⚡)":""}</button>
        {special>0 && <button style={S.cta("#c9a227")} onClick={()=>chooseAction("special")}>✦ {cls.ability.split(":")[0]} (special!)</button>}
        <div style={S.grid}><button style={{...S.choice,margin:0}} onClick={()=>chooseAction("heal")}>✚ Heal</button><button style={{...S.choice,margin:0}} onClick={()=>chooseAction("charge")}>⚡ Charge</button></div>
        <div style={S.grid}><button style={S.ghost} onClick={buyShield} disabled={points<40}>🛡 Shield — 40</button><button style={S.ghost} onClick={buyPower} disabled={points<60}>⚡ Power-up — 60</button></div>
      </>)}
      {battleQ && !finished && (<>
        <div style={S.q}><span style={{...S.badge,marginBottom:0,marginRight:8}}>{battleQ.kind}</span><br/>{battleQ.prompt}</div>
        {battleQ.options.map(opt=>{ let st="idle"; if(battlePicked){ if(opt===battleQ.answer)st="right"; else if(opt===battlePicked)st="wrong"; }
          return <button key={opt} style={S.opt(st)} disabled={!!battlePicked} onClick={()=>answerBattle(opt)}>{opt}</button>; })}
        {battlePicked && <button style={S.cta()} onClick={afterBattle}>Continue →</button>}
      </>)}
      {finished && <button style={S.cta()} onClick={afterBattle}>{mhp<=0?"Victory! Continue →":"Continue →"}</button>}
    </div></div>;
  }

  // ── OVER ──
  if(screen==="over"){
    return <div style={S.shell}><div style={S.card}>
      <span style={S.badge}>Defeated</span>
      <h1 style={S.hat}>{name} has fallen…</h1>
      <p style={{color:"#c4b8a4",lineHeight:1.6}}>You reached <strong style={{color:"#f3ead6"}}>Level {level}</strong> with {points} points. Heroes always rise again!</p>
      <button style={S.cta()} onClick={()=>setScreen("customize")}>Try again ↺</button>
      <button style={S.ghost} onClick={()=>setScreen("start")}>Home</button>
    </div></div>;
  }

  // ── WIN ──
  if(screen==="win"){
    return <div style={S.shell}><div style={S.card}>
      <span style={S.badge}>Quest complete</span>
      <h1 style={S.hat}>{name} is a LEGEND!</h1>
      <div style={S.art(color.hex)}>{heroArt}</div>
      <p style={{color:"#c4b8a4",lineHeight:1.6,textAlign:"center"}}>You conquered all 20 levels and the Chaos Lord with <strong style={{color:"#c9a227"}}>{points} points</strong>!</p>
      <QuestMap trail={trail} level={20} />
      <button style={S.cta()} onClick={()=>setScreen("stats")}>📊 See report card</button>
      <button style={S.ghost} onClick={()=>setScreen("customize")}>Play again ↺</button>
    </div></div>;
  }

  // ── PLAY ──
  if(!question) return <div style={S.shell}><div style={S.card}><div style={S.stat}>Loading…</div></div></div>;
  const isBonus=question.kind==="Element", isPassage=question.subtype==="passage";
  return <div style={S.shell}><div style={S.card}>
    <div style={S.row}><span style={S.badge}>Level {level} / 20</span><span style={S.stat}>★{points} {streak>=2&&`· 🔥${streak}`} · ❤{hp} · ✦{special}</span></div>
    <div style={S.row}>
      <div style={{...S.art(color.hex),flex:"0 0 86px",margin:0}}>{heroArt}</div>
      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:18}}>{name} the {titleFor(level)}</div>
        <div style={{...S.stat,marginBottom:6}}>{cls.name} · Question {qIdx+1} of 5</div>
        <div style={S.bar}><div style={S.fill(qIdx/5*100,color.hex)} /></div></div>
    </div>
    <div style={{...S.stat,marginTop:16,color:isBonus?"#c9a227":"#a89a82"}}>{isBonus?"⚡ PERIODIC-TABLE BONUS":isPassage?"📖 Read carefully, then answer.":"Answer to power up your hero."}</div>
    {isPassage && <div style={S.passage}>{question.passage}</div>}
    <div style={S.q}><span style={{...S.badge,marginBottom:0,marginRight:8}}>{isPassage?"Comprehension":question.kind}</span><br/>{question.prompt}</div>
    {question.options.map(opt=>{ let st="idle"; if(picked){ if(opt===question.answer)st="right"; else if(opt===picked)st="wrong"; }
      return <button key={opt} style={S.opt(st)} disabled={!!picked} onClick={()=>answer(opt)}>{opt}</button>; })}
    {picked && (<>
      <div style={S.feedback(picked===question.answer)}>{picked===question.answer?`Correct! +${isBonus?50:isPassage?30:20}${streak>=3?" +10 streak":""} pts.`:`Not quite — the answer was ${question.answer}.`}</div>
      <button style={S.cta()} onClick={next}>{qIdx<4?"Next question →":"Reach the fork →"}</button>
    </>)}
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
